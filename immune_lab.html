<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>007SaaS Swarm | Digital Life Immunological Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; color: #fff; cursor: crosshair; }
        canvas { display: block; }
        
        /* 叙事灵魂 - 呼吸感文字 */
        #narrative {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.8); font-size: 15px; text-align: center;
            letter-spacing: 2px; text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            animation: breathe 4s ease-in-out infinite; pointer-events: none; width: 90%;
            font-weight: 300;
        }
        @keyframes breathe { 0%, 100% { opacity: 0; transform: translateX(-50%) translateY(10px); } 50% { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* UI 控制台 - 赛博实验室风格 */
        .hud {
            position: absolute; top: 25px; left: 25px; color: #58a6ff;
            background: rgba(1, 4, 9, 0.85); padding: 24px; border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 16px; backdrop-filter: blur(15px); pointer-events: none; font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }
        .label { font-size: 10px; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .value { font-size: 16px; color: #f0f6fc; margin-bottom: 18px; font-weight: bold; }
        .status-secure { color: #3fb950; text-shadow: 0 0 10px rgba(63, 185, 80, 0.4); }
        .status-threat { color: #f85149; text-shadow: 0 0 10px rgba(248, 81, 73, 0.4); }
        
        /* 涌现模式全屏警告 */
        #emergence-overlay {
            position: absolute; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; background: rgba(255, 215, 0, 0.05);
            z-index: 100; pointer-events: none; border: 4px solid rgba(255, 215, 0, 0.2);
        }
        .emergence-text {
            color: #ffd700; font-size: 4.5rem; font-weight: 900; 
            text-shadow: 0 0 40px #ffd700; animation: shake 0.2s infinite;
        }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
    </style>
</head>
<body>

    <canvas id="immuneCanvas"></canvas>
    
    <div id="narrative">
        <span id="narrative-content"></span>
    </div>

    <div class="hud">
        <div style="font-size: 1.1rem; margin-bottom: 20px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">007Swarm IMMUNE LAB</div>
        <p class="label">Immune System Origin</p>
        <p class="value status-secure" id="origin-status">[ STANDBY & SENSING ]</p>
        <p class="label">Pathogen Detected (AI Mutation)</p>
        <p class="value status-threat" id="threat-count">0 UNITS</p>
        <p class="label">Evolutionary Logic Gain</p>
        <p class="value" id="evo-rate">0.00%</p>
        <p class="label">Real-time Telemetry</p>
        <p class="value" id="log" style="font-size: 12px; color: #8b949e;">Waiting for interaction...</p>
        <div style="margin-top:20px; font-size: 10px; color: #444; border-top: 1px solid rgba(255,255,255,0.05); pt-4">
            AUTHORED BY CHEN CHANGXING<br>
            // FLOW_MESH PROTOCOL V2.1
        </div>
    </div>

    <div id="emergence-overlay">
        <div class="emergence-text">EMERGENCE ACTIVE</div>
        <div style="color: #ffd700; font-family: monospace; font-size: 1.2rem; mt-4">EVOLUTION ACCELERATED</div>
    </div>

    <script>
        const canvas = document.getElementById('immuneCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let pathogens = [];
        let antibodies = [];
        let particles = []; 
        let organicMesh = [];
        let isEmergenceMode = false;
        let clickCount = 0;
        let clickTimer;

        // 叙事灵魂文案
        const narrativeLines = [
            {zh: "在这里，每一个字节的防御，都是实时演化出的抗体。", en: "Every byte of defense is an antibody evolved in real-time.", jp: "すべての防御バイトはリアルタイムで進化した抗体です。"},
            {zh: "我们不堆砌防火墙，我们构建“免疫系统”。", en: "We don't build firewalls; we build 'immune systems'.", jp: "ファイアウォールを作るのではなく、「免疫システム」を作ります。"},
            {zh: "攻击 007SaaS 只能让我们变得更强。", en: "Attacking 007SaaS only makes us stronger.", jp: "007SaaSへの攻撃は、私たちをより強くするだけです。"}
        ];
        let narrativeIndex = 0;
        const savedLang = localStorage.getItem('pref-lang') || 'zh';

        function rotateNarrative() {
            const content = document.getElementById('narrative-content');
            content.innerText = narrativeLines[narrativeIndex][savedLang];
            narrativeIndex = (narrativeIndex + 1) % narrativeLines.length;
        }
        rotateNarrative();
        setInterval(rotateNarrative, 4000);

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initMesh();
        }

        function initMesh() {
            organicMesh = [];
            const spacing = 60;
            for(let x = 0; x < width + spacing; x += spacing) {
                for(let y = 0; y < height + spacing; y += spacing) {
                    organicMesh.push({ x, y, ox: x, oy: y });
                }
            }
        }

        class Pathogen { 
            constructor(x, y) {
                this.x = x; this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 1.5 + 1;
                this.size = 8;
                this.dead = false;
                this.trappedBy = null;
            }
            update() {
                if (this.trappedBy) {
                    this.x = this.trappedBy.x; this.y = this.trappedBy.y; return;
                }
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                if(this.x < 0 || this.x > width) this.angle = Math.PI - this.angle;
                if(this.y < 0 || this.y > height) this.angle = -this.angle;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                for(let i=0; i<6; i++) {
                    let r = i % 2 === 0 ? this.size : this.size * 0.4;
                    let a = i * Math.PI / 3;
                    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                }
                ctx.closePath();
                ctx.fillStyle = '#f85149';
                ctx.shadowBlur = 15; ctx.shadowColor = '#f85149';
                ctx.fill();
                ctx.restore();
            }
        }

        class Antibody { 
            constructor(target) {
                this.x = width/2; this.y = height/2;
                this.target = target;
                this.speed = 6;
                this.locked = false;
                this.size = 14;
            }
            update() {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 12) {
                    this.locked = true;
                    this.target.trappedBy = this;
                    this.size -= 0.2; // 吞噬进度
                    if(this.size <= 0) {
                        this.target.dead = true;
                        // 释放反哺能量粒子
                        for(let i=0; i<6; i++) particles.push(new EnergyParticle(this.x, this.y, true));
                    }
                } else {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.strokeStyle = isEmergenceMode ? '#ffd700' : '#00ffff';
                ctx.lineWidth = 2;
                ctx.stroke();
                if(this.locked) {
                    ctx.fillStyle = isEmergenceMode ? 'rgba(255, 215, 0, 0.4)' : 'rgba(0, 255, 255, 0.3)';
                    ctx.fill();
                }
            }
        }

        class EnergyParticle {
            constructor(x, y, isRecycled = false) {
                this.x = x; this.y = y;
                this.isRecycled = isRecycled;
                this.speed = Math.random() * 4 + 4;
            }
            update() {
                const dx = width/2 - this.x;
                const dy = height/2 - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 10) {
                    this.dead = true;
                    triggerPulse();
                } else {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff';
                ctx.fill();
            }
        }

        let originPulse = 0;
        function triggerPulse() {
            originPulse = 40;
            let rate = parseFloat(document.getElementById('evo-rate').innerText);
            document.getElementById('evo-rate').innerText = (rate + 0.05).toFixed(2) + "%";
        }

        function triggerEmergence() {
            if(isEmergenceMode) return;
            isEmergenceMode = true;
            document.getElementById('emergence-overlay').style.display = 'flex';
            document.getElementById('log').innerText = "[STATUS] Evolution Accelerated. System Overload? No.";
            
            setTimeout(() => {
                pathogens = [];
                originPulse = 1500; // 金色冲击波
                document.getElementById('emergence-overlay').style.display = 'none';
                setTimeout(() => {
                    isEmergenceMode = false;
                    document.getElementById('evo-rate').innerText = (parseFloat(document.getElementById('evo-rate').innerText) + 15).toFixed(2) + "% [EMERGENT]";
                }, 1000);
            }, 2500);
        }

        window.addEventListener('mousedown', (e) => {
            clickCount++;
            pathogens.push(new Pathogen(e.clientX, e.clientY));
            document.getElementById('log').innerText = "[WARN] Foreign Antigen Detected at Cursor.";
            
            setTimeout(() => {
                pathogens.forEach(p => { if(!p.trappedBy) antibodies.push(new Antibody(p)); });
            }, 400);

            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                if(clickCount > 8) triggerEmergence();
                clickCount = 0;
            }, 800);
        });

        function animate() {
            ctx.fillStyle = 'rgba(0, 3, 8, 0.25)';
            ctx.fillRect(0, 0, width, height);

            // 绘制核心
            ctx.beginPath();
            ctx.arc(width/2, height/2, 20 + originPulse, 0, Math.PI * 2);
            ctx.fillStyle = isEmergenceMode ? '#ffd700' : '#00ffff';
            ctx.fill();
            if(originPulse > 0) originPulse *= 0.85;

            // 网格炎症
            ctx.beginPath();
            ctx.strokeStyle = isEmergenceMode ? 'rgba(255, 215, 0, 0.1)' : 'rgba(88, 166, 255, 0.06)';
            organicMesh.forEach(node => {
                pathogens.forEach(p => {
                    const dx = p.x - node.x; const dy = p.y - node.y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if(d < 100) {
                        node.x += (node.x - p.x) * 0.03;
                        node.y += (node.y - p.y) * 0.03;
                    }
                });
                node.x += (node.ox - node.x) * 0.1;
                node.y += (node.oy - node.y) * 0.1;
                ctx.rect(node.x, node.y, 1, 1);
            });
            ctx.stroke();

            pathogens = pathogens.filter(p => !p.dead);
            pathogens.forEach(p => { p.update(); p.draw(); });
            antibodies = antibodies.filter(a => a.size > 0);
            antibodies.forEach(a => { a.update(); a.draw(); });
            particles = particles.filter(p => !p.dead);
            particles.forEach(p => { p.update(); p.draw(); });

            document.getElementById('threat-count').innerText = pathogens.length + " UNITS";
            if(pathogens.length > 0) {
                document.getElementById('origin-status').innerText = "[ IMMUNE RESPONSE ACTIVE ]";
                document.getElementById('origin-status').className = "value status-threat";
            } else {
                document.getElementById('origin-status').innerText = "[ STANDBY & SENSING ]";
                document.getElementById('origin-status').className = "value status-secure";
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
